services:
  django:
    build:
      context: ./ab_reservas_project
      dockerfile: Dockerfile
    container_name: ab-reservas-web
    env_file:
      - ./ab_reservas_project/.env
    volumes:
      - ./ab_reservas_project:/app
    depends_on:
      - db
    command: poetry run python manage.py runserver 0.0.0.0:8000

  nginx:
    image: nginx:alpine
    container_name: ab-reservas-nginx
    volumes:
      - ./nginx/nginx.backend.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ab_reservas_project/media:/app/media:ro
    ports:
      - "8000:80"
    depends_on:
      - django

  db:
    image: postgres:16-alpine
    container_name: ab-reservas-db
    env_file:
      - ./ab_reservas_project/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
